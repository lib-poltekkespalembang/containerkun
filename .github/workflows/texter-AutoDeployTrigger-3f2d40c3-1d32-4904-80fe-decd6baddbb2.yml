name: Trigger auto deployment for texter

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/texter-AutoDeployTrigger-3f2d40c3-1d32-4904-80fe-decd6baddbb2.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TEXTER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TEXTER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TEXTER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: texter.azurecr.io
          registryUsername: ${{ secrets.TEXTER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.TEXTER_REGISTRY_PASSWORD }}
          containerAppName: texter
          resourceGroup: containerkun
          imageToBuild: texter.azurecr.io/texter:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


